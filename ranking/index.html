<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랭킹 (Ranking)</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f8f9fa; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { font-size: 1.5rem; color: #212529; border-bottom: 2px solid #ffc107; padding-bottom: 10px; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #dee2e6; }
        th { background-color: #f1f3f5; font-weight: 600; }
        tr:nth-child(1) td { background-color: #fff9db; font-weight: bold; } 
        .back-btn { display: inline-block; margin-top: 20px; text-decoration: none; color: #007bff; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 실시간 랭킹</h1>
        <table>
            <thead>
                <tr><th>순위</th><th>닉네임</th><th>점수</th></tr>
            </thead>
            <tbody>
                <tr><td>🥇 1위</td><td>정열의개발자</td><td>9,950점</td></tr>
                <tr><td>🥈 2위</td><td>코딩하는고양이</td><td>8,820점</td></tr>
                <tr><td>🥉 3위</td><td>PWA마스터</td><td>7,450점</td></tr>
            </tbody>
        </table>
        <a href="../" class="back-btn">← 홈으로 돌아가기</a>
    </div>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js'); }
    </script>
</body>
</html>
